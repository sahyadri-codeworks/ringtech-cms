name: Supabase Keep Alive Ping

on:
  schedule:
    # Runs at 00:00 every 3rd day of the month
    - cron: '0 0 */3 * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        env:
          SUPABASE_URL: 'https://xxjljkirxnqbzpnwvgbs.supabase.co'
          SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4amxqa2lyeG5xYnpwbnd2Z2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NDY4NTksImV4cCI6MjA5MzAyMjg1OX0.pxFm2Mm36vGK8H2eAtC9OnD60Wcg72Pa95wcdMyCjLY'
        run: |
          echo "Pinging Supabase to prevent project pause..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --retry 3 --retry-delay 10 --retry-all-errors \
            --max-time 30 \
            -X GET "${SUPABASE_URL}/rest/v1/posts?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "HTTP Status: ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Supabase pinged successfully!"
          else
            echo "Supabase ping failed with status ${HTTP_STATUS}"
            exit 1
          fi
